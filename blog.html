---
title: Blog
---
<h1>Latest Posts</h1>

<ul class="blog-list">
  {% for post in site.posts %}
    <li class="blog-list-item">
      <div class="row">
        <div class="col, blog-list-title"><a href="{{ site.url }}{{ post.url }}">{{ post.title }}</a></div>
        <div class="col, blog-list-date">{{ post.date | date_to_string }}</div>
      </div>
      <div class="blog-list-excerpt">{{ post.excerpt }}</div>
    </li>
  {% endfor %}
</ul>
